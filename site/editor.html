<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editor - The Political Prism</title>
    <meta name="description" content="Create an annotated Political Prism triangle with custom points and labels.">
    <meta name="theme-color" content="#f4f1e8">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,750&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="editor">
    <div class="page-shell">
      <header class="site-header" aria-label="Site header">
        <a class="brand" href="./" aria-label="The Political Prism home">
          <img class="brand-mark" src="favicon.svg" alt="" aria-hidden="true">
          <span>The Political Prism</span>
        </a>
        <div class="header-actions">
          <nav class="nav-links" aria-label="Primary navigation">
            <a href="editor.html" aria-current="page">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/><circle cx="12" cy="12" r="7"/></svg>
              <span>Editor</span>
            </a>
            <a href="quiz.html">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v16H6z"/><path d="M9 8h6M9 12h6M9 16h3"/></svg>
              <span>Quiz</span>
            </a>
            <a href="https://github.com/RedeemedSpoon/Political-Prism-Test">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 9-4 3 4 3M16 9l4 3-4 3M14 5l-4 14"/></svg>
              <span>Source code</span>
            </a>
          </nav>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme" title="Toggle color theme">
            <svg class="theme-icon sun-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2M12 22v-3M5 12H2M22 12h-3M6.6 6.6 4.5 4.5M19.5 19.5l-2.1-2.1M17.4 6.6l2.1-2.1M4.5 19.5l2.1-2.1"/><circle cx="12" cy="12" r="4"/></svg>
            <svg class="theme-icon moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 8.5 8.5 0 1 0 20 15.5z"/></svg>
          </button>
        </div>
      </header>

      <main>
        <section class="editor-page" aria-labelledby="editorTitle">
          <div class="section-heading compact">
            <p class="kicker">Prism editor</p>
            <h1 id="editorTitle">Build an annotated prism.</h1>
            <p>Create a custom reading of the same Freedom, Equality, and Stability triangle.</p>
          </div>

          <div class="editor-workbench">
            <section class="editor-board" aria-label="Political Prism editor">
              <div class="editor-toolbar" aria-label="Editor commands">
                <button class="command secondary icon-label" id="addEditorPoint" type="button">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/><circle cx="12" cy="12" r="7"/></svg>
                  <span>Add point</span>
                </button>
                <button class="command secondary icon-label" id="removeEditorPoint" type="button">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10M9 7v12h6V7M10 4h4"/></svg>
                  <span>Remove</span>
                </button>
                <button class="command secondary icon-label" id="clearEditorDraft" type="button">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M8 7v12h8V7M9 4h6"/></svg>
                  <span>Clear</span>
                </button>
                <button class="command primary icon-label" id="exportEditorPng" type="button">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10M8 10l4 4 4-4"/><path d="M5 20h14"/></svg>
                  <span>Export PNG</span>
                </button>
              </div>

              <div id="editorCanvas" class="triangle-canvas editor-canvas prism-canvas" aria-live="polite"></div>
            </section>

            <aside class="editor-panel" aria-label="Prism editor controls">
              <div class="editor-panel-scroll">
                <details class="editor-fieldset editor-collapse" aria-labelledby="editorAnnotationHeading" open>
                  <summary class="editor-collapse-summary">
                    <h2 id="editorAnnotationHeading">Annotation</h2>
                    <svg class="editor-collapse-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 10 4 4 4-4"/></svg>
                  </summary>
                  <div class="editor-collapse-body">
                    <label for="editorTitleInput">Title</label>
                    <input id="editorTitleInput" type="text" maxlength="80" autocomplete="off">
                    <label for="editorSubtitleInput">Subtitle</label>
                    <textarea id="editorSubtitleInput" rows="3" maxlength="180"></textarea>
                  </div>
                </details>

                <details class="editor-fieldset editor-collapse" aria-labelledby="editorAxisHeading">
                  <summary class="editor-collapse-summary">
                    <h2 id="editorAxisHeading">Axis</h2>
                    <svg class="editor-collapse-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 10 4 4 4-4"/></svg>
                  </summary>
                  <div class="editor-collapse-body">
                    <label for="editorAxisSelect">Pole</label>
                    <select id="editorAxisSelect">
                      <option value="freedom">Freedom</option>
                      <option value="equality">Equality</option>
                      <option value="stability">Stability</option>
                    </select>
                    <label for="editorAxisLabel">Axis label</label>
                    <input id="editorAxisLabel" type="text" maxlength="28" autocomplete="off">
                    <label for="editorAxisNote">Axis subtext</label>
                    <textarea id="editorAxisNote" rows="2" maxlength="72"></textarea>
                  </div>
                </details>

                <details class="editor-fieldset editor-collapse" aria-labelledby="editorPointHeading" open>
                  <summary class="editor-collapse-summary">
                    <div class="editor-panel-title">
                      <h2 id="editorPointHeading">Point</h2>
                      <span id="editorPointCount">0 points</span>
                    </div>
                    <svg class="editor-collapse-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 10 4 4 4-4"/></svg>
                  </summary>
                  <div class="editor-collapse-body">
                    <label for="editorPointLabel">Label</label>
                    <input id="editorPointLabel" type="text" maxlength="48" autocomplete="off">
                    <label for="editorPointTone">Tone</label>
                    <select id="editorPointTone">
                      <option value="freedom">Freedom</option>
                      <option value="equality">Equality</option>
                      <option value="stability">Stability</option>
                    </select>
                  </div>
                </details>

                <details class="editor-fieldset editor-collapse" aria-labelledby="editorPointsHeading" open>
                  <summary class="editor-collapse-summary">
                    <h2 id="editorPointsHeading">Points</h2>
                    <svg class="editor-collapse-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 10 4 4 4-4"/></svg>
                  </summary>
                  <div class="editor-collapse-body">
                    <div class="editor-point-list" id="editorPointList" aria-label="Custom prism points"></div>
                  </div>
                </details>

                <p class="editor-status" id="editorStatus" role="status"></p>

                <label class="editor-theme-control">
                  <input id="editorExportDarkMode" type="checkbox">
                  <span>Use dark mode for export</span>
                </label>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
